{{ define "main" }}
<section class="section section--page">
  <div class="wrap">
    <p class="eyebrow">projects</p>
    <h1 class="page-title">{{ .Title }}</h1>
    {{ if .Content }}<div class="page-desc">{{ .Content }}</div>{{ end }}

    <div class="card-grid card-grid--full">
      {{ range .Pages.ByParam "weight" }}
      <a class="card" href="{{ .RelPermalink }}">
        <div class="card__top">
          <span class="pill pill--{{ if eq .Params.status "production" }}ok{{ else }}pending{{ end }}">{{ .Params.status }}</span>
        </div>
        <h3 class="card__title">{{ .Title }}</h3>
        <p class="card__summary">{{ .Params.summary }}</p>
        <div class="card__tags">
          {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
        </div>
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
