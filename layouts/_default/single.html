{{ define "main" }}
<article class="section section--page post">
  <div class="wrap wrap--narrow">
    <p class="eyebrow">{{ .Section }}</p>
    <h1 class="page-title">{{ .Title }}</h1>
    <div class="post__meta">
      <time class="logline__time">{{ .Date.Format "2006-01-02" }}</time>
      {{ if .Params.tags }}
      <span class="logline__tags">{{ range .Params.tags }}#{{ . }} {{ end }}</span>
      {{ end }}
    </div>
    <div class="prose">
      {{ .Content }}
    </div>
    <a class="back-link" href="/{{ .Section }}/">← back to {{ .Section }}</a>
  </div>
</article>
{{ end }}
